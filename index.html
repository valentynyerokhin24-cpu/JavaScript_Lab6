<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна робота №6 - Lights Out</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="aero-container">
        <h1>Гра: Lights Out (5x5)</h1>
        <div class="level-selector">
            <button onclick="setupGame('a')">Рівень A</button>
            <button onclick="setupGame('b')">Рівень B</button>
            <button onclick="setupGame('c')">Рівень C</button>
        </div>
        
        <div id="game-board"></div>

        <div class="stats">
            <p>Кроків: <span id="steps-count">0</span></p>
            <p>Ціль: <span id="target-moves">-</span></p>
            <button id="reset-btn">Скинути рівень</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
