<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна 6 - Lights Out</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="aero-container">
        <h1>Lights Out (5x5)</h1>
        <div class="level-controls">
            <button onclick="loadLevel(0)">Рівень A</button>
            <button onclick="loadLevel(1)">Рівень B</button>
            <button onclick="loadLevel(2)">Рівень C</button>
        </div>
        
        <div id="game-board"></div>

        <div class="stats">
            <p>Ціль: <span id="target-moves">0</span> кр.</p>
            <p>Зроблено: <span id="current-moves">0</span></p>
            <p>Час: <span id="timer">0:00</span></p>
            <button id="restart-btn">Restart</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
